
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hỗ trợ Fix lỗi Hệ thống BTCNN</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#008080">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fix lỗi BCTCNN">
    <link rel="apple-touch-icon" href="https://vst.mof.gov.vn/webcenter/oracle/webcenter/siteresources/scopedMD/shared/KBNN/images/logo.png">
    <link rel="icon" type="image/png" href="https://vst.mof.gov.vn/webcenter/oracle/webcenter/siteresources/scopedMD/shared/KBNN/images/logo.png">

    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #333; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input[type="password"], select, textarea, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        textarea { height: 120px; resize: vertical; }
        button { background: #008080; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #006666; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #installBtn { background: #ff9800; display: none; margin-bottom: 20px; }
        .console-container { background: black; padding: 15px; border-radius: 6px; margin-top: 20px; height: 250px; overflow-y: auto; }
        pre { color: #00FF00; font-family: Consolas, monospace; font-size: 13px; margin: 0; white-space: pre-wrap; }
        .error-msg { color: red; text-align: center; margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div class="container" id="loginScreen">
        <div style="text-align: center;">
            <img src="https://vst.mof.gov.vn/webcenter/oracle/webcenter/siteresources/scopedMD/shared/KBNN/images/logo.png" alt="Logo" width="80">
        </div>
        <h3>Đăng nhập Hệ thống</h3>
        <input type="password" id="passInput" placeholder="Nhập mật khẩu truy cập...">
        <div id="loginError" class="error-msg">Mật khẩu không chính xác!</div>
        <button id="loginBtn" onclick="verifyLogin()">Đăng nhập</button>
    </div>

    <div class="container" id="mainApp" style="display: none;">
        <button id="installBtn" onclick="installApp()">📲 Cài đặt App lên Điện thoại</button>

        <h2>Công cụ Xử lý Lỗi BCTCNN</h2>
        
        <label>Chọn loại lỗi cần xử lý:</label>
        <select id="errorType">
            <option value="tkt_dv_nguoidung / tkt_dv_dvgd">tkt_dv_nguoidung / tkt_dv_dvgd</option>
            <option value="tkt_dm_kbnn">tkt_dm_kbnn</option>
        </select>

        <label>Mã đơn vị:</label>
        <textarea id="maDvInput" placeholder="Ví dụ:&#10;819.10183.1160615&#10;424.14TTT.1039519&#10;(Có thể nhập nhiều mã cách nhau bằng dấu phẩy hoặc xuống dòng)"></textarea>

        <button id="execBtn" onclick="sendRequest()">🚀 Thực thi (Fix lỗi)</button>

        <div class="console-container">
            <pre id="consoleLog">Chào mừng bạn đến với hệ thống xử lý Web App!</pre>
        </div>
    </div>

    <script>
        // ĐIỀN LINK WEB APP MỚI NHẤT CỦA BẠN VÀO ĐÂY
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz61YDIZAVbJIjNYu9Wt2T_gZrx8Jm9Y_B2epWplleY_34NZQ2mTITXu9Fxkr0yTgd8/exec";  

        // --- BẢO MẬT ĐĂNG NHẬP ---
        window.onload = () => {
            // Kiểm tra xem đã đăng nhập chưa (Lưu tạm thời trong tab hiện tại)
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                showApp();
            }
        };

        async function verifyLogin() {
            const pass = document.getElementById("passInput").value.trim();
            const btn = document.getElementById("loginBtn");
            const err = document.getElementById("loginError");

            if (!pass) return;
            
            btn.disabled = true;
            btn.innerText = "Đang kiểm tra...";
            err.style.display = "none";

            try {
                let res = await fetch(SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "verify_pass", password: pass })
                });

                // Vì dùng no-cors nên fetch không trả về JSON đọc được trực tiếp.
                // Tuy nhiên, ta có thể dùng mẹo: Đẩy kèm request, nếu sai pass App Script sẽ đánh dấu lỗi nội bộ.
                // Nhưng để chuẩn xác nhất trên frontend, ta đành fetch dạng GET qua Google Script để đọc response JSON (an toàn vì script che pass gốc)
                
                // Mẹo GET Check:
                let checkRes = await fetch(`${SCRIPT_URL}?action=check_status`); // Bỏ qua, gọi GET lấy list pending ko chứa pass
                
            } catch(e) {} // Fallback for no-cors POST workaround.

            // CÁCH CHUẨN ĐỂ ĐỌC TRẢ VỀ JSON TỪ GOOGLE SCRIPT MÀ KHÔNG BỊ CORS:
            fetch(`${SCRIPT_URL}?action=check_status`) // Dummy call
            
            // XỬ LÝ FETCH CHUẨN CHO LOGIN:
            // Sẽ gửi dạng text, nhưng ta dùng cách gọi GET với tham số để lách CORS đọc JSON:
            let response = await fetch(`${SCRIPT_URL}?action=get_pending`, { method: "GET" }).catch(()=>null);
        }

        // Tối ưu lại Login an toàn không vướng CORS:
        async function verifyLogin() {
            const pass = document.getElementById("passInput").value;
            const btn = document.getElementById("loginBtn");
            btn.innerText = "Đang kết nối...";
            btn.disabled = true;
            
            // Gửi qua POST lách CORS, gas sẽ xử lý
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'verify_pass', password: pass })
            }).then(() => {
                // Để biết đúng hay sai, ta viết 1 trick ở GAS: nếu đúng, GAS tạo 1 temporary cache, 
                // hoặc cách đơn giản nhất: Gửi một Request check pass dạng POST, đợi 1 giây, GET status.
                // Ở đây, để dễ nhất cho bạn, ta sửa lại hàm doGet ở trên để check pass.
            });
        }
    </script>

    <script>
        // SỬA LẠI LUỒNG LOGIN ĐƠN GIẢN MÀ HIỆU QUẢ: 
        async function verifyLogin() {
            const pass = document.getElementById("passInput").value.trim();
            const btn = document.getElementById("loginBtn");
            const err = document.getElementById("loginError");
            if (!pass) return;

            btn.disabled = true;
            btn.innerText = "Đang kiểm tra...";
            err.style.display = "none";

            // Dùng fetch lấy HTML từ link Web App sau khi redirect (thủ thuật vượt CORS)
            try {
                // Gửi qua POST và mặc định nếu GAS trả về ok (status)
                await fetch(SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "verify_pass", password: pass })
                });

                // Do no-cors không đọc được response, ta thiết lập: Nếu sai pass, 
                // bạn có thể đặt mật khẩu cố định tạm, hoặc tôi sẽ hướng dẫn bạn check bằng GET.
                
                // CÁCH TỐI ƯU NHẤT CHO WEB GITHUB PAGES:
                let url = SCRIPT_URL + "?action=verify_pass&password=" + encodeURIComponent(pass);
                let res = await fetch(url);
                let data = await res.json();

                if (data.status === "ok") {
                    sessionStorage.setItem("isLoggedIn", "true");
                    showApp();
                } else {
                    err.style.display = "block";
                    btn.disabled = false;
                    btn.innerText = "Đăng nhập";
                }
            } catch (error) {
                err.innerText = "Lỗi mạng, không thể xác minh.";
                err.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Đăng nhập";
            }
        }

        function showApp() {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
        }

        // --- CÁC HÀM XỬ LÝ APP ---
        function appendLog(msg) {
            const logWindow = document.getElementById("consoleLog");
            logWindow.textContent += "\n" + msg;
            logWindow.parentElement.scrollTop = logWindow.parentElement.scrollHeight;
        }

        async function sendRequest() {
            const errorType = document.getElementById("errorType").value;
            const maDvInput = document.getElementById("maDvInput").value.trim();
            const btn = document.getElementById("execBtn");

            if (!maDvInput) return alert("Vui lòng nhập Mã đơn vị!");

            btn.disabled = true;
            document.getElementById("consoleLog").textContent = "Đang gửi yêu cầu lên hệ thống...";
            const reqId = "REQ_" + new Date().getTime(); 

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "create_request", req_id: reqId, error_type: errorType, ma_dv: maDvInput })
                });

                appendLog("[OK] Yêu cầu đã được ghi nhận. Đang chờ Backend xử lý...");

                const checkInterval = setInterval(async () => {
                    appendLog("...Đang quét trạng thái từ DB nội bộ...");
                    try {
                        let res = await fetch(`${SCRIPT_URL}?action=check_status&req_id=${reqId}`);
                        let data = await res.json();
                        if (data.status === "Hoàn thành" || data.status === "Lỗi") {
                            clearInterval(checkInterval);
                            appendLog("\n--- KẾT QUẢ TỪ BACKEND ---\n" + data.log);
                            btn.disabled = false;
                        } else if (data.status === "Đang xử lý") {
                            appendLog("Backend đã tiếp nhận và đang chạy lệnh Oracle...");
                        }
                    } catch (e) {}
                }, 3000);

            } catch (err) {
                appendLog("[LỖI] Không thể kết nối đến máy chủ: " + err);
                btn.disabled = false;
            }
        }

        // --- CÀI ĐẶT PWA (Cài lên màn hình chính) ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Hiện nút cài đặt nếu dùng Chrome/Android
            document.getElementById('installBtn').style.display = 'block';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('installBtn').style.display = 'none';
                    }
                    deferredPrompt = null;
                });
            }
        }

        // Đăng ký Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
